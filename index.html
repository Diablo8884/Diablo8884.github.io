<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skibidi</title>
  <style>
    :root {
      --mx: 50vw;
      --my: 50vh;
      --rx: 0deg;
      --ry: 0deg;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(45, 95, 255, 0.20), transparent 26%),
        radial-gradient(circle at 15% 20%, rgba(170, 40, 255, 0.12), transparent 22%),
        radial-gradient(circle at 85% 80%, rgba(0, 255, 210, 0.10), transparent 24%),
        linear-gradient(180deg, #02030a 0%, #000 100%);
      color: #fff;
      font-family: ui-serif, Georgia, "Times New Roman", serif;
      cursor: none;
    }

    @media (hover: none), (pointer: coarse) {
      html, body {
        cursor: auto;
      }
      .cursor {
        display: none;
      }
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    .nebula {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at var(--mx) var(--my), rgba(100, 180, 255, 0.18), transparent 16%),
        radial-gradient(circle at calc(var(--mx) * 0.7) calc(var(--my) * 1.1), rgba(120, 80, 255, 0.14), transparent 18%),
        radial-gradient(circle at calc(var(--mx) * 1.2) calc(var(--my) * 0.8), rgba(255, 0, 180, 0.10), transparent 14%);
      filter: blur(18px) saturate(1.3);
      mix-blend-mode: screen;
      opacity: 0.9;
    }

    .scene {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      perspective: 1200px;
    }

    .title-wrap {
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(var(--rx)) rotateY(var(--ry));
      will-change: transform;
      filter: drop-shadow(0 0 20px rgba(90, 170, 255, 0.35));
    }

    .title-wrap::before {
      content: "";
      position: absolute;
      inset: -120px -170px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, rgba(110, 160, 255, 0.22), transparent 42%),
        radial-gradient(circle at center, rgba(255, 255, 255, 0.10), transparent 58%);
      filter: blur(30px);
      animation: glow 5s ease-in-out infinite;
      transform: translateZ(-120px);
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      padding: 0.18em 0.35em;
      font-size: clamp(2.6rem, 8vw, 7rem);
      line-height: 0.95;
      text-align: center;
      letter-spacing: 0.05em;
      color: #f8fbff;
      text-shadow:
        0 0 6px rgba(255,255,255,0.85),
        0 0 18px rgba(88, 175, 255, 0.6),
        0 0 42px rgba(43, 96, 255, 0.42),
        0 0 90px rgba(140, 0, 255, 0.16);
      -webkit-text-stroke: 1px rgba(180, 220, 255, 0.18);
      user-select: none;
      animation: breathe 5s ease-in-out infinite;
    }

    .cursor {
      position: fixed;
      left: 0;
      top: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid rgba(225, 245, 255, 0.95);
      box-shadow:
        0 0 12px rgba(95, 185, 255, 0.85),
        0 0 36px rgba(95, 185, 255, 0.22);
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%) scale(1);
      will-change: transform, left, top, opacity;
      transition: opacity 120ms ease, width 120ms ease, height 120ms ease;
      z-index: 10;
      mix-blend-mode: screen;
    }

    .cursor::before {
      content: "";
      position: absolute;
      inset: 50%;
      width: 160px;
      height: 160px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(90,175,255,0.20), transparent 60%);
      filter: blur(12px);
    }

    .cursor.pulse {
      width: 38px;
      height: 38px;
    }

    .dash {
      position: fixed;
      left: 0;
      top: 0;
      width: 90px;
      height: 3px;
      border-radius: 999px;
      pointer-events: none;
      opacity: 0.95;
      transform-origin: left center;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(140,210,255,1), rgba(255,255,255,0));
      box-shadow: 0 0 12px rgba(110, 190, 255, 0.8);
      z-index: 9;
      mix-blend-mode: screen;
    }

    @keyframes glow {
      0%, 100% { transform: translateZ(-120px) scale(0.96); opacity: 0.6; }
      50% { transform: translateZ(-120px) scale(1.05); opacity: 0.95; }
    }

    @keyframes breathe {
      0%, 100% { transform: translateZ(50px) scale(1); }
      50% { transform: translateZ(50px) scale(1.02); }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
      html, body {
        cursor: auto;
      }
      .cursor, .dash {
        display: none;
      }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="nebula"></div>

  <div class="scene">
    <div class="title-wrap" id="titleWrap">
      <h1>Skibidi</h1>
    </div>
  </div>

  <div class="cursor" id="cursor"></div>

  <script>
    const root = document.documentElement;
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    const cursor = document.getElementById('cursor');
    const titleWrap = document.getElementById('titleWrap');

    let w = 0;
    let h = 0;
    let dpr = 1;
    let cx = 0;
    let cy = 0;

    let targetX = 0;
    let targetY = 0;
    let currentX = 0;
    let currentY = 0;
    let hasMouse = false;

    let stars = [];
    let particles = [];
    let dashes = [];

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      cx = w / 2;
      cy = h / 2;

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      if (!hasMouse) {
        targetX = currentX = cx;
        targetY = currentY = cy;
      }

      const count = Math.max(90, Math.floor((w * h) / 9000));
      stars = Array.from({ length: count }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        z: Math.random(),
        r: Math.random() * 1.7 + 0.2,
        phase: Math.random() * Math.PI * 2,
        vx: (Math.random() - 0.5) * 0.14,
        vy: (Math.random() - 0.5) * 0.14
      }));
    }

    function addParticles(x, y, amount, power) {
      for (let i = 0; i < amount; i++) {
        particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * power,
          vy: (Math.random() - 0.5) * power,
          life: 1,
          decay: Math.random() * 0.018 + 0.012,
          size: Math.random() * 2.4 + 0.8
        });
      }
      if (particles.length > 180) particles.splice(0, particles.length - 180);
    }

    function addDash(x, y, angle) {
      dashes.push({
        x,
        y,
        angle,
        life: 1,
        decay: 0.035
      });
      if (dashes.length > 24) dashes.splice(0, dashes.length - 24);
    }

    function drawBackground(x, y) {
      const g = ctx.createRadialGradient(x, y, 0, x, y, Math.max(w, h) * 0.6);
      g.addColorStop(0, 'rgba(70, 150, 255, 0.22)');
      g.addColorStop(0.35, 'rgba(120, 70, 255, 0.08)');
      g.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    }

    function drawFrame(x, y) {
      ctx.clearRect(0, 0, w, h);
      drawBackground(x, y);

      const now = performance.now() * 0.0012;

      for (const s of stars) {
        s.x += s.vx;
        s.y += s.vy;
        if (s.x < -10) s.x = w + 10;
        if (s.x > w + 10) s.x = -10;
        if (s.y < -10) s.y = h + 10;
        if (s.y > h + 10) s.y = -10;

        const parallaxX = (x - cx) * s.z * 0.02;
        const parallaxY = (y - cy) * s.z * 0.02;

        const dx = s.x - x;
        const dy = s.y - y;
        const dist = Math.hypot(dx, dy);
        const radius = 180;
        const force = Math.max(0, (radius - dist) / radius);
        const push = force * force * 26;
        const repelX = dist > 0 ? (dx / dist) * push : 0;
        const repelY = dist > 0 ? (dy / dist) * push : 0;

        const sx = s.x + parallaxX + repelX;
        const sy = s.y + parallaxY + repelY;
        const tw = 0.55 + 0.45 * Math.sin(now + s.phase);
        const alpha = 0.18 + tw * 0.82;
        const size = s.r * (0.7 + tw * 1.3);

        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.arc(sx, sy, size, 0, Math.PI * 2);
        ctx.fill();
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;

        const life = Math.max(p.life, 0);
        ctx.beginPath();
        ctx.fillStyle = `rgba(130, 205, 255, ${life})`;
        ctx.arc(p.x, p.y, p.size * life, 0, Math.PI * 2);
        ctx.fill();

        if (p.life <= 0) particles.splice(i, 1);
      }

      for (let i = dashes.length - 1; i >= 0; i--) {
        const d = dashes[i];
        d.life -= d.decay;
        const len = 90 * d.life;
        const width = 3 * d.life;
        const alpha = Math.max(d.life, 0);
        const dx = Math.cos(d.angle) * len;
        const dy = Math.sin(d.angle) * len;

        ctx.save();
        ctx.translate(d.x, d.y);
        ctx.rotate(d.angle);
        ctx.beginPath();
        ctx.strokeStyle = `rgba(150, 220, 255, ${alpha})`;
        ctx.lineWidth = width;
        ctx.lineCap = 'round';
        ctx.moveTo(-len * 0.55, 0);
        ctx.lineTo(len * 0.45, 0);
        ctx.stroke();
        ctx.restore();

        if (d.life <= 0) dashes.splice(i, 1);
      }
    }

    function animate() {
      currentX += (targetX - currentX) * 0.2;
      currentY += (targetY - currentY) * 0.2;

      const dx = currentX - cx;
      const dy = currentY - cy;
      const rx = (-dy / cy) * 8;
      const ry = (dx / cx) * 9;

      root.style.setProperty('--mx', currentX + 'px');
      root.style.setProperty('--my', currentY + 'px');
      root.style.setProperty('--rx', rx.toFixed(2) + 'deg');
      root.style.setProperty('--ry', ry.toFixed(2) + 'deg');

      titleWrap.style.transform = `translate3d(${dx * 0.01}px, ${dy * 0.01}px, 0) rotateX(${rx}deg) rotateY(${ry}deg)`;

      if (hasMouse) {
        cursor.style.opacity = '1';
        cursor.style.left = currentX + 'px';
        cursor.style.top = currentY + 'px';
      }

      drawFrame(currentX, currentY);
      requestAnimationFrame(animate);
    }

    function onMove(x, y) {
      hasMouse = true;
      targetX = x;
      targetY = y;
    }

    document.addEventListener('mousemove', (e) => {
      onMove(e.clientX, e.clientY);
    }, { passive: true });

    document.addEventListener('pointermove', (e) => {
      if (e.pointerType === 'mouse') {
        onMove(e.clientX, e.clientY);
      }
    }, { passive: true });

    document.addEventListener('mousedown', (e) => {
      const angle = Math.atan2(currentY - e.clientY, currentX - e.clientX);
      addParticles(e.clientX, e.clientY, 16, 1.35);
      addDash(e.clientX, e.clientY, angle);
      cursor.classList.add('pulse');
      setTimeout(() => cursor.classList.remove('pulse'), 120);
    });

    window.addEventListener('resize', resize);

    resize();
    animate();
  </script>
</body>
</html>
